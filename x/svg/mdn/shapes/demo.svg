<svg version="1.1" width="500" height="500" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<style><![CDATA[
			#stroke-blue {
			stroke: blue;
			stroke-width: 1;
			fill: none;
			}
			#stroke-blue:hover {
			stroke: green;
      fill: black;
			}
			]]></style>
	</defs>

	<rect width="100%" height="100%" fill="red"/>
	<circle cx="50" cy="50" r="40" fill="green"/>
	<text x="50" y="60" font-size="20" text-anchor="middle" fill="white">SVG</text>

	<!-- Rectangle -->
	<rect x="5" y="5" width="10" height="10" stroke="blue" fill="none"/>
	<!-- rx, ry define radius of the rectangle corners -->
	<rect x="5" y="17" width="10" height="10" rx="1" ry="1" stroke="blue" fill="none"/>

	<!-- Circle -->
	<circle cx="10" cy="90" r="5" stroke="blue" fill="none"/>
	<ellipse cx="10" cy="78" rx="6" ry="4" stroke="blue" fill="none"/>

	<!-- Line -->
	<line x1="85" y1="5" x2="95" y2="5" stroke="blue" stroke-width="1"/>
	<!--
    points is a space-separated list of (x,y) pairs, each pair is separated
    with ", " (note the space after comma).
  -->
	<polyline points="85, 10 95, 10 95, 15" stroke="blue" stroke-width="1" fill="none"/>
	<!-- polygon is a closed polyline -->
	<polygon points="85, 20 95, 20 95, 25" stroke="blue" stroke-width="1" fill="none"/>

	<!-- Path -->
	<!--
    Commands:
      M x y   Move to (x, y)
      L x y   Line to (x, y)
      H x     Horizontal line to (x, y) with y from the last point
      V y     Vertical line to (x, y) with x from the last point
      Z       Close path

    Bezier Curves
      C x1 y1, x2 y2, x y   Cubic
      S x2 y2, x y          Quadratic
      T x y                 Connect to the last curve
  -->
	<path d="M 85 75 H 95 V 80" style="stroke: blue; stroke-width: 1; fill: none"/>
	<path d="M 85 85 H 95 V 90 Z" id="stroke-blue"/>
</svg>
