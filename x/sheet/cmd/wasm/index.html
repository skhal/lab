<html>
	<head>
		<meta charset="utf-8">
		<title>Sheet</title>
		<script src="wasm_exec.js" type="text/javascript"></script>
		<script>
			const go = new Go();
			WebAssembly
			.instantiateStreaming(fetch("sheet.wasm"), go.importObject)
			.then((result) => { go.run(result.instance) });
			class Sheet {
				constructor() {}
				calculate(input) { output.value = run(input) }
			}
			const sheet = new Sheet();
		</script>
	</head>
	<body>
		<textarea id="input" name="sheet-input" cols="80" rows="20"></textarea>
		<br>
		<input id="calculate" type="button" name="calculate" value="calculate" onclick="sheet.calculate(input.value)">
		<br>
		<textarea id="output" name="sheet-output" cols="80" rows="20"></textarea>
	</body>
</html>
