<html>
	<head>
		<meta charset="utf-8">
		<title>Wasm Hello</title>
		<script src="wasm_exec.js"></script>
		<script type="text/javascript">
			window.onload = (_) => {
				const go = new Go();
				WebAssembly
				.instantiateStreaming( fetch("hello.wasm"), go.importObject)
				.then((result) => { go.run(result.instance) });
			}
		</script>
	</head>
	<body>
		Check console log for WASM messages.
	</body>
</html>
