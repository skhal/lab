edition = "2024";

package book.irex;

import "google/protobuf/go_features.proto";
import "book/irex/pb/intent.proto";
import "book/irex/pb/symbol.proto";

option features.(.pb.go).api_level = API_OPAQUE;
option go_package = "github.com/skhal/lab/book/irex/pb";

// PlotIntent describes a user intent to plot a symbol.
//
// Next ID: 2
message PlotIntent {
  extend Intent {
    PlotIntent plot_intent = 525000001;
  }

  // symbol is the financial symbol to plot.
  Symbol symbol = 1;
}
