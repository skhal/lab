edition = "2024";

package book.irex;

import "google/protobuf/go_features.proto";
import "book/irex/pb/feature.proto";

option features.(.pb.go).api_level = API_OPAQUE;
option go_package = "github.com/skhal/lab/book/irex/pb";

// PingFeature pings the server.
//
// Next ID: 3
message PingFeature {
  extend Feature {
    PingFeature ping_feature = 525010002;
  }
  // pins is the incoming message.
  string ping = 1;

  // pong is the outgoind message.
  string pong = 2;
}
