edition = "2024";

package book.irex;

import "google/protobuf/go_features.proto";

option features.(.pb.go).api_level = API_OPAQUE;
option go_package = "github.com/skhal/lab/book/irex/pb";

// Feature is a distinctive entity on the finance results page.
//
// Next ID: 1
message Feature {
  extensions 525010000 to max
  [declaration = {
    number: 525010001,
    full_name: ".book.irex.PlotFeature.plot_feature",
    type: ".book.irex.PlotFeature",
  },
   declaration = {
     number: 525010002,
     full_name: ".book.irex.PingFeature.ping_feature",
     type: ".book.irex.PingFeature",
   }];
}
