{{define "axis" -}}
<g>
	<path d="{{.Line}}" class="axis"/>
	<path d="{{.Guides}}" class="guide"/>
</g>
{{- end}}

<p>{{.Title}}</p>
<svg version="1.1" width="600" height="300" viewbox="{{.ViewBox}}" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<style><![CDATA[
			.background {
			fill: rgb(0 0 200 / 2%);
			}
			path.axis {
			stroke: black;
			stroke-width: 0.5;
			fill: none;
			}
			path.guide {
			stroke: rgb(121 121 121 / 50%);
			stroke-width: 0.25;
			stroke-dasharray: 5 5;
			fill: none;
			}
			path.line {
			stroke: green;
			stroke-width: 0.5;
			fill: none;
			}
			]]></style>
	</defs>
	<rect x="0" y="0" width="100%" height="100%" class="background"/>
	{{include "axis" .X | indent "\t"}}
	{{include "axis" .Y | indent "\t"}}
	<g transform="translate({{.Origin}}) scale(1 -1)">
		<path d="{{.Path}}" class="line"/>
	</g>
</svg>
