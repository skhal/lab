{{define "axis" -}}
<path d="{{.Line}}" class="axis"/>
{{- end}}

<svg version="1.1" width="600" height="300" viewbox="{{.ViewBox}}" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<style><![CDATA[
			.background {
			fill: white;
			}
			.axis {
			stroke: black;
			stroke-width: 0.25;
			}
			.line {
			stroke: green;
			stroke-width: 0.5;
			fill: none;
			}
			]]></style>
	</defs>
	<rect x="0" y="0" width="100%" height="100%" class="background"/>
	<text x="50%" y="5" font-size="5" text-anchor="middle">{{.Title}}</text>
	{{template "axis" .X}}
	{{template "axis" .Y}}
	<g transform="translate({{.Origin}}) scale(1 -1)">
		<path d="{{.Path}}" class="line"/>
	</g>
</svg>
