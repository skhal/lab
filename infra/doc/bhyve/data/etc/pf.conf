ext_if = "epair7b"
int_if = "bridge0"

tcp_services = "{ domain, http, https, ldap, ntp, ssh }"
udp_services = "{ domain, ntp }"

icmp_types = "{ echoreq, unreach }"

table <jail_net> const { 10.0.0.0/24 }

# -- NAT
# Jails to ext_if
nat on $ext_if inet from $int_if:network to any -> ($ext_if)

# -- Filter
# Don't filter on the loopback interface
set skip on lo0

# Scrub incoming packets
match in all scrub (no-df)

# Deny all traffic
block log all

# Activate spoofing protection for all interfaces
block in quick from urpf-failed

# Allow all traffic on int_if
pass log quick on $int_if all

# Allow outbound traffic from int_if to ext_if
pass out log on $ext_if from $int_if:network to any

# Allow connections created by the system, retain the state.
pass out log proto tcp to any port $tcp_services
pass     log proto udp to any port $udp_services

# Debugging traffic
pass inet proto icmp all icmp-type $icmp_types

# SSH from jail network
pass in log on $ext_if inet proto tcp from <jail_net> to $int_if:network port ssh
