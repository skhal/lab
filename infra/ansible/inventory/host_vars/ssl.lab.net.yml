---
# keep-sorted start
ansible_jexec_over_ssh_jail_name: ssl
local_unbound_forward_zones:
  - name: "."
    addr: 192.168.10.1
local_unbound_stub_zones:
  - name: "lab.net"
    addr: 10.0.0.2@853
    tls_upstream: true
  - name: "10.in-addr.arpa."
    addr: 10.0.0.2@853
    tls_upstream: true
    type: always_transparent
openssl_ca_common_name: ca.ssl.lab.net
openssl_ca_organization: Lab
pkg_install:
  - neovim
ssh_allow_users:
  - op
ssh_listen_addresses:
  - 10.0.0.4
timezone_name: America/Chicago
user_list:
  # keep-sorted start
  - name: op
    shell: /bin/tcsh
  - name: root
    group: wheel
    home: /root
    shell: /bin/tcsh
  # keep-sorted end
# keep-sorted end
