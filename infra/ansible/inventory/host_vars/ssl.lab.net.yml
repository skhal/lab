---
# keep-sorted start
ansible_jexec_over_ssh_jail_name: ssl
local_unbound_forward_zones:
  - name: "."
    addr: 192.168.10.1
local_unbound_stub_zones:
  - name: "lab.net"
    addr: 10.0.0.2@5353
  - name: "10.in-addr.arpa."
    addr: 10.0.0.2@5353
    type: always_transparent
openssl_ca_common_name: ca.ssl.lab.net
openssl_ca_organization: Lab
openssl_ca_passphrase: !vault |
  $ANSIBLE_VAULT;1.1;AES256
  66633861626466373831306664303136653263313765363638343935383263383232613139303239
  6531623631393330376330333233393432663438663635360a376266633131616134636435356661
  62373462613331656331363666363334633061613230396136333565303564613138396439663463
  6137623263656133320a356666303832653733323361396633336136633430366261653064363639
  3831
pkg_install:
  - neovim
ssh_allow_users:
  - op
ssh_listen_addresses:
  - 10.0.0.4
user_list:
  # keep-sorted start
  - name: op
    shell: /bin/tcsh
  - name: root
    group: wheel
    home: /root
    shell: /bin/tcsh
  # keep-sorted end
# keep-sorted end
