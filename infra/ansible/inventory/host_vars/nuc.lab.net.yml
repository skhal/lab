---
# keep-sorted start
jail_skel_migrate_users:
  - "{{ ansible_user }}"
jail_skel_packages:
  # keep-sorted start
  - FreeBSD-csh # for /bin/tcsh
  - FreeBSD-runtime # for /etc/os-release
  - doas
  - neovim
  # keep-sorted end
jail_skel_zfs_dataset: zroot/usr/jail/15.1
local_unbound_forward_zones:
  - name: "."
    addr: 192.168.10.1
local_unbound_stub_zones:
  - name: "lab.net"
    addr: 10.0.0.2@853
    tls_upstream: true
  - name: "10.in-addr.arpa."
    addr: 10.0.0.2@853
    tls_upstream: true
    type: always_transparent
netif_bridges:
  - name: bridge0
    cidr: 10.0.0.1/24
    desc: jail:int
netif_ifaces:
  - name: igc0
    cidr: 192.168.10.101/24
pflog_enable: true
pkg_install:
  - neovim
rc_migrate:
  # keep-sorted start
  - name: moused_nondefault_enable
    value: false
    path: /etc/rc.conf.d/moused
  - name: powerd_enable
    value: true
    path: /etc/rc.conf.d/powerd
  # keep-sorted end
rc_remove:
  - dumpdev
rc_update:
  # keep-sorted start
  - name: autoboot_delay
    value: 0
    path: /boot/loader.conf
  - name: rc_debug
    value: true
  - name: rc_info
    value: true
  # keep-sorted end
routing_defaultrouter: 192.168.10.1
ssh_allow_users:
  - op
ssh_listen_addresses:
  - 192.168.10.101
  - 10.0.0.1
user_list:
  # keep-sorted start
  - name: op
    shell: /bin/tcsh
  - name: root
    group: wheel
    home: /root
    shell: /bin/tcsh
  # keep-sorted end
# sync with users in ldap
zfs_mkhomedir_users:
  - name: skhalatyan
    uid: 10001
    gid: 10001
# keep-sorted end
