# keep-sorted start
hostname_name: "nuc.lab.net"
netif_clones:
  - name: bridge0
    cidr: 192.168.10.101/24
    addm:
      - igc0
    desc: jail:ext
  - name: bridge1
    cidr: 10.0.0.1/24
    desc: jail:int
netif_ethernet_if: igc0
pflog_enable: true
pkg_install:
  - neovim
routing_defaultrouter: 192.168.10.1
ssh_allow_users:
  - op
# keep-sorted end
