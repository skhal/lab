---
# keep-sorted start
ansible_jexec_over_ssh_jail_name: bsd
local_unbound_forward_zones:
  - name: "."
    addr: 192.168.10.1
local_unbound_stub_zones:
  - name: "lab.net"
    addr: 10.0.0.2@853
    tls_upstream: true
  - name: "10.in-addr.arpa."
    addr: 10.0.0.2@853
    tls_upstream: true
    type: always_transparent
ssh_allow_groups:
  - ssh
ssh_listen_addresses:
  - 10.0.0.101
# keep-sorted end
