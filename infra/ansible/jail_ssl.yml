---
- name: Create SSL jail
  hosts: nuc.lab.net

  gather_facts: false

  become: true
  become_method: community.general.doas

  vars:
    # keep-sorted start
    jail_bridge: bridge1
    jail_cidr: 10.0.0.4/24
    jail_defaultrouter: 10.0.0.1
    jail_name: ssl
    # keep-sorted end

  roles:
    - role: jail
      tags: jail

- name: Bootstrap SSL jail
  hosts: ssl.lab.net

  connection: jexec_over_ssh
  vars:
    ansible_ssh_host: nuc.lab.net
    ansible_jexec_over_ssh_jail_name: ssl
    ansible_jexec_over_ssh_escalator: doas

  gather_facts: false

  become: true
  become_method: community.general.doas

  roles:
    - role: ssh
      tags: ssh

    - role: syslog
      tags: syslog

    - role: user
      tags: user

    - role: pkg
      tags: pkg

- name: Configure DNS server
  hosts: ssl.lab.net

  connection: jexec_over_ssh
  vars:
    ansible_ssh_host: nuc.lab.net
    ansible_jexec_over_ssh_jail_name: ssl
    ansible_jexec_over_ssh_escalator: doas

  gather_facts: false

  become: true
  become_method: community.general.doas

  roles:
    - role: local_unbound
      tags: local_unbound
