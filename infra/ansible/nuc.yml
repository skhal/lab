---
- name: Bootstrap NUC
  hosts: nuc.lab.net
  tags: bootstrap
  roles:
    - role: rc
    - role: syslog
    - role: pkg
    - role: ntp
    - role: hostname
    - role: periodic
    - role: zfs
    - role: timezone

- name: Configure Users
  hosts: nuc.lab.net
  tags: users
  roles:
    - role: user
    - role: zfs_mkhomedir

- name: Configure network
  hosts: nuc.lab.net
  tags: network
  roles:
    - role: routing
    - role: netif

- name: Configure firewall
  hosts: nuc.lab.net
  tags: pf
  roles:
    - role: pflog
    - role: pf

- name: Configure Services
  hosts: nuc.lab.net
  tags: services
  roles:
    - role: ssh
    - role: local_unbound
