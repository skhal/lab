---
pkg_install:
  # keep-sorted start
  - FreeBSD-audit-dev # incall bsm/audit.h for go-delve
  - FreeBSD-bmake # install make(1)
  - FreeBSD-clibs-dev # install C libraries for Go cgo.
  - FreeBSD-libexecinfo-dev # install execinfo for Rust cargo protols
  - FreeBSD-runtime-dev # install libutil.h for go-delve
  - FreeBSD-toolchain # install default C compiler to enable Go cgo.
  - FreeBSD-utilities-dev # install libprocstat.h for go-delve
  - bash # for pre-commit & co
  - git
  - go126
  - llvm21
  - lua-language-server
  - npm
  - protobuf
  - protobuf-go
  - py312-black # python formatter
  - py312-isort # python import sorter
  - py312-poetry # python environment and packaging
  - py312-pre-commit
  - rust
  - stylua # Lua formatter
  - tmux
  - tree
  - typescript-go
  - typos # spell checker
  - unzip
  # keep-sorted end
