---
- name: Remove defaultrouter
  community.general.sysrc:
    name: defaultrouter
    state: absent

- name: "Set defaultrouter to {{ base_network.defaultrouter_ip }}"
  community.general.sysrc:
    path: /etc/rc.conf.d/routing
    name: defaultrouter
    value: "{{ base_network.defaultrouter_ip }}"
  notify: "restart routing"
