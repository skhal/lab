---
- name: "Migrate ifconfig_{{ base_network_ethernet_if }}"
  ansible.builtin.import_tasks: "sysrc_migrate.yml"
  notify: "restart_network"
  vars:
    migrate:
      name: "ifconfig_{{ base_network_ethernet_if }}"
      value: up
      path: /etc/rc.conf.d/network

- name: Configure bridges
  ansible.builtin.include_tasks: "ifconfig_bridge.yml"
  loop: "{{ base_network_bridges }}"
  loop_control:
    loop_var: bridge
