---
- name: "Migrate zfs_enable"
  ansible.builtin.include_tasks: "sysrc_migrate.yml"
  vars:
    migrate:
      name: zfs_enable
      value: true
      path: /etc/rc.conf.d/zfs

- name: "Update periodic"
  block:
    - name: "Update /etc/periodic.conf - scrub every 2 weeks"
      community.general.sysrc:
        path: /etc/periodic.conf
        name: daily_scrub_zfs_default_threshold
        value: 14

    - name: "Update /etc/periodic.conf - enable periodic scrub"
      community.general.sysrc:
        path: /etc/periodic.conf
        name: daily_scrub_zfs_enable
        value: true
