---
- name: "Migrate sshd_enable"
  ansible.builtin.import_tasks: "sysrc_migrate.yml"
  vars:
    migrate:
      name: sshd_enable
      path: /etc/rc.conf.d/sshd

- name: "Update configuration"
  block:
    - name: "SSH listen on bridge interfaces"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "ListenAddress={{ ansible_facts[item].ipv4 | map(attribute='address') | flatten | first }}"
      loop: "{{ ansible_facts.interfaces | select('match', '^bridge') }}"
      notify: "restart_sshd"

    - name: "SSH allow op user"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "AllowUsers=op"
      notify: "restart_sshd"
