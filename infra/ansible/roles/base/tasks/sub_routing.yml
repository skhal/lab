---
- name: "Remove defaultrouter from /etc/rc.conf"
  community.general.sysrc:
    name: defaultrouter
    state: absent

- name: Set defaultrouter to {{ base_network_defaultrouter }}
  community.general.sysrc:
    path: /etc/rc.conf.d/routing
    name: defaultrouter
    value: "{{ base_network_defaultrouter }}"
  notify: "restart_routing"
