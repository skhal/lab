# VARIABLES
#
# bridge struct {
#   // name is the bridge name, e.g. bridge0.
#   name string
#
#   // ip is the bridge ip with sub-network, e.g. 1.2.3.4/24
#   ip string
#
#   // member is the member interface.
#   member
#
#   // descr is the bridge description.
#   descr
# }
---
- name: "Add {{ bridge.name }}"
  community.general.sysrc:
    path: /etc/rc.conf.d/network
    name: cloned_interfaces
    state: value_present
    value: "{{ bridge.name }}"
  notify: "restart_network"

- name: "Configure {{ bridge.name }}"
  community.general.sysrc:
    path: /etc/rc.conf.d/network
    name: "ifconfig_{{ bridge.name }}"
    value: "inet {{ bridge.ip }} addm {{ bridge.member }} up descr {{ bridge.descr }}"
  notify: "restart_network"
