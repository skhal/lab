---
- name: "Use latest packages"
  ansible.builtin.import_tasks: "pkg_latest.yml"

- name: "Add pkg aliases"
  ansible.builtin.include_tasks: "pkg_alias.yml"
  loop: "{{ base_vars.pkg.aliases }}"
  vars:
    alias:
      name: "{{ item.name }}"
      value: "{{ item.value }}"

- name: "Install NeoVim"
  community.general.pkgng:
    name: neovim
    state: latest
