---
- name: "Use latest branch"
  ansible.builtin.copy:
    src: ./files/usr/local/etc/pkg/repos/FreeBSD.conf
    dest: /usr/local/etc/pkg/repos/FreeBSD.conf
    owner: root
    group: wheel
    mode: u=rw,g=r,o=r
  notify: "upgrade_packages"

- name: "Add pkg aliases"
  ansible.builtin.include_tasks: "pkg_alias.yml"
  loop: "{{ base_pkg_aliases }}"
  loop_control:
    loop_var: alias

- name: "Install packages"
  community.general.pkgng:
    name: "{{ base_pkg_list }}"
    state: latest
