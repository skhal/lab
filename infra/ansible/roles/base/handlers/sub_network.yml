---
- name: "Restart network"
  listen: "restart_network"
  ansible.builtin.service:
    name: netif
    state: restarted
  async: 30
  poll: 0
  register: base_restart_network_job

- name: "Wait for network to restart"
  listen: "restart_network"
  ansible.builtin.async_status:
    jid: "{{ base_restart_network_job.ansible_job_id }}"
  retries: 10
  register: base_restart_network_result
  until: base_restart_network_result is finished
