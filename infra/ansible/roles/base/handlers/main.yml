---
- name: Upgrade packages
  ansible.builtin.service:
    name: "*"
    state: latest
  listen: "upgrade packages"

- name: Restart syslogd
  ansible.builtin.service:
    name: syslogd
    state: restarted
  listen: "restart syslogd"

- name: Restart ntpd
  ansible.builtin.service:
    name: ntpd
    state: restarted
  listen: "restart ntpd"
