---
- name: Upgrade packages
  ansible.builtin.service:
    name: "*"
    state: latest
  listen: "upgrade packages"

- name: Restart syslogd
  ansible.builtin.service:
    name: syslogd
    state: restarted
  listen: "restart syslogd"

- name: Restart ntpd
  ansible.builtin.service:
    name: ntpd
    state: restarted
  listen: "restart ntpd"

- name: Restart sshd
  ansible.builtin.service:
    name: sshd
    state: restarted
  listen: "restart sshd"

- name: Restart routing
  ansible.builtin.service:
    name: routing
    state: restarted
  listen: "restart routing"

- name: Start pf
  ansible.builtin.service:
    name: pf
    state: started
  listen: "start pf"

- name: Reload pf.conf
  ansible.builtin.service:
    name: pf
    state: reloaded
  listen: "reload pf.conf"

- name: Start pflog
  ansible.builtin.service:
    name: pflog
    state: started
  listen: "start pflog"
