---
- name: "Migrate defaultrouter"
  ansible.builtin.include_role:
    name: sysrc
  vars:
    sysrc_migrate:
      name: defaultrouter
      value: "{{ routing_defaultrouter }}"
      path: /etc/rc.conf.d/routing
      notify: "restart_routing"
