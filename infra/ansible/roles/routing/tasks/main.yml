---
- name: "Migrate defaultrouter"
  ansible.builtin.include_role:
    name: sysrc
  vars:
    sysrc_migrate:
      name: defaultrouter
      value: "{{ routing_defaultrouter }}"
      path: /etc/rc.conf.d/routing
      notify: "restart_routing"

- name: "Enable gateway in /etc/rc.conf.d/routing"
  community.general.sysrc:
    name: gateway_enable
    value: true
    path: /etc/rc.conf.d/routing
  when: routing_enable_gateway
  notify: "restart_routing"
