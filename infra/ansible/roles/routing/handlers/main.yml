---
- name: "Restart routing"
  listen: "restart_routing"
  become: true
  ansible.builtin.service:
    name: routing
    state: restarted
  async: 30
  poll: 0
  register: routing_restart_task

- name: "Wait for routing to restart"
  listen: "restart_routing"
  ansible.builtin.async_status:
    jid: "{{ routing_restart_task.ansible_job_id }}"
  retries: 10
  register: routing_wait_restart_task
  until: routing_wait_restart_task is finished
