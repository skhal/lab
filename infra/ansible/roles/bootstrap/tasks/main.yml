---
# Install Python with ansible.builtin.raw because the node is assumed to be
# clean with base installation.
- name: "Install packages"
  vars:
    pkg_python: >-
      {{ bootstrap_packages | select('match', 'python') | join(' ') }}
    pkg_not_python: >-
      {{ bootstrap_packages | reject('match', 'python') | join(' ') }}
  block:
    - name: "Install {{ pkg_python }}"
      ansible.builtin.raw: "pkg install --quiet --yes {{ pkg_python }}"
      register: bootstrap_install_python
      changed_when:
        - bootstrap_install_python.rc == 0
        - '"already installed" not in bootstrap_install_python.stdout'

    # Python is installed in the previous step. Can use
    # community.general.pkgng now to install non-Python packages.
    - name: "Install {{ pkg_not_python }}"
      community.general.pkgng:
        name: "{{ pkg_not_python }}"
