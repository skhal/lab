---
# can't use community.general.pkgng because the system does not have it
# installed yet.
- name: "Install python and doas"
  ansible.builtin.raw: "pkg install -y {{ bootstrap_packages | join(' ') }}"
  register: bootstrap_install
  changed_when: bootstrap_install.rc != 0
