---
- name: "Migrate syslog"
  ansible.builtin.include_role:
    name: sysrc
  vars:
    sysrc_migrate:
      name: syslogd_flags
      value: "-ss"
      path: /etc/rc.conf.d/syslogd

- name: "Enable console logs"
  become: true
  ansible.builtin.lineinfile:
    path: /etc/syslog.conf
    regexp: "^#(console.info.*)$"
    line: "\\1"
    backrefs: true
  notify: "restart_syslogd"
