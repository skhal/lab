{{ jail_name }} {
  vnet.interface = "e0b_${name}";

{% for dep in jail_depend %}
{% if loop.first %}
  depend = "{{ dep }}";
{% else %}
  depend += "{{ dep }}";
{% endif %}
{% endfor %}

{% if jail_allow_chflags %}
  allow.chflags;
{% endif %}

  mount = "/home/op $path/home/op nullfs rw 0 0";
{% for mount in jail_mounts %}
  mount += "{{ mount.path }} $path{{ mount.path }} nullfs {{ mount.perm | default('rw') }} 0 0";
  exec.prepare += "[ -d $path{{ mount.path }} ] || mkdir -m 0755 $path{{ mount.path }}";
{% endfor %}

  exec.prestart += "e0=\$(ifconfig epair create) && ifconfig \${e0} up name e0a_${name} && ifconfig \${e0%a}b up name e0b_${name}";
  exec.prestart += "ifconfig {{ jail_bridge }} addm e0a_${name}";
  exec.prestart += "ifconfig e0a_${name} description 'vnet0 host interface for ${name} jail'";

  exec.poststop += "ifconfig e0a_${name} destroy";
}
