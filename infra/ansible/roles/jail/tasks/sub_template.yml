---
- name: "Create a dataset"
  vars:
    dset: "{{ jail_zfs_dataset }}/{{ jail_template_name }}"
  block:
    - name: "Create dataset {{ dset }}"
      community.general.zfs:
        name: "{{ dset }}"
        state: present
        extra_zfs_properties:
          # keep-sorted start
          canmount: "on"
          readonly: "off"
          # keep-sorted end

    - name: "Get dataset {{ dset }} mount properties" # noqa name[template]
      community.general.zfs_facts:
        name: "{{ dset }}"
        type: filesystem
        properties: "name,mounted,mountpoint"
      register: jail_zfs_facts

- name: "Install packages"
  ansible.builtin.include_tasks: "create_template.yml"
  vars:
    path: "{{ jail_zfs_facts.ansible_facts.ansible_zfs_datasets[0].mountpoint }}"
  when: jail_zfs_facts.ansible_facts.ansible_zfs_datasets[0].mounted == "yes"
