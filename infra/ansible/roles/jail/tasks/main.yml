---
- name: "Pick skeleton last snapsthot"
  block:
    - name: "Get snapshots of {{ jail_skel_zfs_dataset }}"
      community.general.zfs_facts:
        name: "{{ jail_skel_zfs_dataset }}"
        type: snapshot
        properties: "name"
      register: jail_zfs_list_snapshots
      changed_when: false

    - name: "Pick latest snapshot of {{ jail_skel_zfs_dataset }}"
      ansible.builtin.set_fact:
        jail_skel_zfs_dataset_snapshot: "{{ item }}"
      loop: >-
        {{
          jail_zfs_list_snapshots.ansible_facts.ansible_zfs_datasets
              | map(attribute='name')
        }}
      loop_control:
        extended: true
      when: ansible_loop.last

- name: "Clone skeleton {{ jail_skel_zfs_dataset }}"
  vars:
    _dset: "{{ jail_skel_zfs_dataset | dirname | default(omit) }}/{{ jail_name }}"
  block:
    - name: "Check if jail exists at {{ _dset }}"
      community.general.zfs_facts:
        name: "{{ _dset }}"
        type: filesystem
        properties: "name,mounted,mountpoint"
      register: jail_zfs_facts_task
      ignore_errors: true # only want to check if the dataset exists

    - name: "Create dataset"
      when: jail_zfs_facts_task is failed
      block:
        # noqa name[template]
        - name: "Copy skeleton to {{ _dset }}"
          become: true
          ansible.builtin.shell:
            cmd: >-
              set -o pipefail;
              zfs send {{ jail_skel_zfs_dataset_snapshot }} |
                zfs receive {{ _dset }}
            executable: /bin/sh
          register: jail_zfs_copy
          changed_when: jail_zfs_copy is succeeded

        - name: "Set dataset properties for {{ _dset }}"
          become: true
          community.general.zfs:
            name: "{{ _dset }}"
            state: present
            extra_zfs_properties:
              # keep-sorted start
              canmount: "on"
              readonly: "off"
              # keep-sorted end

        - name: "Get info for {{ _dset }}"
          community.general.zfs_facts:
            name: "{{ _dset }}"
            type: filesystem
            properties: "name,mounted,mountpoint"
          register: jail_zfs_facts_new

    - name: "Get jail mountpoint"
      vars:
        facts: "{{ [jail_zfs_facts_new, jail_zfs_facts_task] | selectattr('ansible_facts', 'defined') | first }}"
      block:
        - name: "Jail must be mounted"
          ansible.builtin.assert:
            that: >-
              facts.ansible_facts.ansible_zfs_datasets
                | selectattr("name", "equalto", _dset)
                | selectattr("mounted", "equalto", "yes")
                | count == 1
            fail_msg: "{{ _dset }} is not mounted"
            quiet: true

        - name: "Get jail mountpoint"
          ansible.builtin.set_fact:
            jail_path: >-
              {{
                facts.ansible_facts.ansible_zfs_datasets
                  | selectattr('name', 'equalto', _dset)
                  | map(attribute='mountpoint')
                  | first
                  | default(omit)
              }}

- name: "Configure jail {{ jail_name }}"
  vars:
    _conf_path: /etc/jail.conf.d/{{ jail_name }}.conf
    _routing_conf_path: "{{ jail_path }}/etc/rc.conf.d/routing"
    _resolv_conf_path: "{{ jail_path }}/etc/resolv.conf"
  block:
    - name: Create {{ _conf_path | dirname }}
      become: true
      ansible.builtin.file:
        path: "{{ _conf_path | dirname }}"
        state: directory
        owner: root
        group: wheel
        mode: u=rwx,g=rx,o=rx

    - name: "Create jail config {{ _conf_path }}"
      become: true
      ansible.builtin.template:
        src: etc/jail.conf.d/jail.conf
        dest: "{{ _conf_path }}"
        owner: root
        group: wheel
        mode: u=rw,g=r,o=r
        validate: /usr/sbin/jail -f %s -e ' '

    - name: "Set default router in {{ _routing_conf_path }}"
      become: true
      community.general.sysrc:
        name: defaultrouter
        value: "{{ jail_defaultrouter }}"
        path: "{{ _routing_conf_path }}"

    - name: "Configure network"
      vars:
        _rc_file: "{{ jail_path }}/etc/rc.conf.d/network"
      block:
        # noqa name[template]
        - name: "Update {{ _rc_file }} - name vnet interface"
          become: true
          community.general.sysrc:
            name: ifconfig_e0b_{{ jail_name }}_name
            value: "vnet0"
            path: "{{ _rc_file }}"

        - name: "Update {{ _rc_file }} - configure vnet interface" # noqa name[template]
          become: true
          community.general.sysrc:
            name: ifconfig_vnet0
            value: "inet {{ jail_cidr }}"
            path: "{{ _rc_file }}"

    - name: "Configure resolver in {{ _resolv_conf_path }}"
      become: true
      ansible.builtin.lineinfile:
        path: "{{ _resolv_conf_path }}"
        line: "nameserver {{ routing_defaultrouter }}"
        owner: root
        group: wheel
        mode: u=rw,g=r,o=r
        create: true

    - name: "Disable DNS lookup of the remote host in SSH"
      become: true
      ansible.builtin.lineinfile:
        path: "{{ jail_path }}/etc/ssh/sshd_config"
        line: "UseDNS no"

- name: "Enable jail {{ jail_name }}"
  become: true
  community.general.sysrc:
    name: jail_list
    value: "{{ jail_name }}"
    state: value_present
    path: /etc/rc.conf.d/jail

# can't use handlers because Ansible does not support passing parameters to
# handlers, i.e. can't pass the jail name to start. Don't create "smart" logic
# that would propagate the list of jails to start because all variables are
# global and other tasks may change the list before the handler runs breaking
# encapsulation.
- name: Run jail
  block:
    - name: Check if the jail runs
      ansible.builtin.command:
        cmd: jls -j {{ jail_name }} -c
      register: jail_jls_task
      failed_when: false
      changed_when: false

    # noqa command-instead-of-module
    - name: "Run jail {{ jail_name }}"
      become: true
      ansible.builtin.command:
        cmd: service jail start {{ jail_name }}
      when: jail_jls_task.rc != 0
      register: jail_service_restart_result
      changed_when: jail_service_restart_result is succeeded
