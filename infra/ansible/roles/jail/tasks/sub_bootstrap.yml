# VARIABLES
#
# zfs struct {
#   dataset struct {
#     name string
#   }
# }
#
# conf struct {
#   prefix string
# }
#
# network struct {
#   bridge struct {
#     name string
#     ip string
#     descr string
#   }
# }
---
- name: "Configure ZFS"
  block:
    - name: "Create zfs dataset"
      community.general.zfs:
        name: "{{ zfs.dataset.name }}"
        state: present
        extra_zfs_properties:
          # keep-sorted start
          canmount: "off"
          readonly: "on"
          # keep-sorted end

- name: "Create /etc/jail.conf"
  ansible.builtin.template:
    src: templates/etc/jail.conf.j2
    dest: /etc/jail.conf
    owner: root
    group: wheel
    mode: u=rw,g=r,o=r
    validate: /usr/bin/jail -f /etc/jail.conf -e ' '
  vars:
    prefix: "{{ conf.prefix }}"

- name: "Configure jail service"
  block:
    - name: "Enable jail"
      community.general.sysrc:
        path: /etc/rc.conf.d/jail
        name: jail_enable
        value: true
      notify: "start_jail"

    - name: "Stop jails in reverse order"
      community.general.sysrc:
        path: /etc/rc.conf.d/jail
        name: jail_reverse_stop
        value: true

# Restart services
- name: "Flush handlers"
  ansible.builtin.meta: flush_handlers
