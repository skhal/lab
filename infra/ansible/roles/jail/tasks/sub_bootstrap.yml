---
- name: "Configure ZFS"
  block:
    - name: "Create zfs dataset"
      community.general.zfs:
        name: "{{ jail_zfs_dataset }}"
        state: present
        extra_zfs_properties:
          # keep-sorted start
          canmount: "off"
          readonly: "on"
          # keep-sorted end

- name: "Create /etc/jail.conf"
  ansible.builtin.template:
    src: templates/etc/jail.conf.j2
    dest: /etc/jail.conf
    owner: root
    group: wheel
    mode: u=rw,g=r,o=r
    validate: /usr/bin/jail -f /etc/jail.conf -e ' '
  vars:
    prefix: "{{ jail_prefix }}"

- name: "Configure jail service"
  block:
    - name: "Enable jail"
      community.general.sysrc:
        path: /etc/rc.conf.d/jail
        name: jail_enable
        value: true
      notify: "start_jail"

    - name: "Stop jails in reverse order"
      community.general.sysrc:
        path: /etc/rc.conf.d/jail
        name: jail_reverse_stop
        value: true
