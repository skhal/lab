---
- name: "Update rc-config"
  ansible.builtin.include_role:
    name: sysrc
  vars:
    sysrc_migrate: "{{ item }}"
  loop:
    - name: ntpd_enable
      value: true
      path: /etc/rc.conf.d/ntpd
    - name: ntpd_sync_on_start
      value: true
      path: /etc/rc.conf.d/ntpd

- name: "Update config"
  ansible.builtin.include_tasks: "update.yml"
  loop:
    - name: ignore wildrace interface
      line: interface ignore wildcard
    - name: listen on loopback
      line: interface listen 127.0.0.1
  vars:
    _update: "{{ item | combine({'file': '/etc/ntp.conf'}) }}"
