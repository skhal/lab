---
# ssh_allow_users lists user names to allow for ssh (see AllowUsers in
# sshd_config(5)).
ssh_allow_users: []
# ssh_allow_groups lists user groups to allow to ssh (see AllowGroups in
# sshd_config(5))
ssh_allow_groups: []
# ssh_listen_addresses lists IPv4 addresses for SSH server to listen on.
ssh_listen_addresses: []
# ssh_server_config points at sshd_config file.
ssh_server_config: /etc/ssh/sshd_config
