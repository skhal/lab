---
# noqa name[template]
- name: "Update {{ pkg_conf_path }} - add alias {{ _alias.name }}"
  ansible.builtin.lineinfile:
    path: "{{ pkg_conf_path }}"
    insertafter: "^ALIAS {"
    line: '    {{ _alias.name }} = "{{ _alias.value }}";'
