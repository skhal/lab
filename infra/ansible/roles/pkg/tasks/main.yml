---
- name: "Use latest branch"
  become: true
  ansible.builtin.copy:
    src: usr/local/etc/pkg/repos/FreeBSD.conf
    dest: /usr/local/etc/pkg/repos/
    owner: root
    group: wheel
    mode: u=rw,g=r,o=r
    directory_mode: u=rwx,g=rx,o=rx
  notify: "upgrade_packages"

- name: "Add pkg aliases"
  ansible.builtin.include_tasks: "alias.yml"
  loop: "{{ pkg_aliases }}"
  loop_control:
    loop_var: _alias

- name: "Install packages {{ pkg_install }}"
  become: true
  community.general.pkgng:
    name: "{{ pkg_install }}"
    state: latest
  when: pkg_install | length > 0
