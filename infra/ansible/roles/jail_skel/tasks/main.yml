---
- name: "Configure ZFS"
  notify: "jail_skel_snapshot"
  block:
    - name: "Create parent datasets {{ jail_skel_zfs_dataset | dirname }}"
      community.general.zfs:
        name: "{{ jail_skel_zfs_dataset | dirname }}"
        state: present
        extra_zfs_properties:
          # keep-sorted start
          canmount: "off"
          readonly: "on"
          # keep-sorted end
      when: >-
        jail_skel_zfs_dataset
          | dirname
          | split('/')
          | count > 1

    - name: "Create dataset {{ jail_skel_zfs_dataset }}"
      community.general.zfs:
        name: "{{ jail_skel_zfs_dataset }}"
        state: present
        extra_zfs_properties:
          # keep-sorted start
          canmount: "on"
          readonly: "off"
          # keep-sorted end

    - name: "Get dataset properties"
      community.general.zfs_facts:
        name: "{{ jail_skel_zfs_dataset }}"
        type: filesystem
        properties: "name,mounted,mountpoint"
      register: jail_skel_get_dset_props_task

    - name: "Dataset must be mounted"
      ansible.builtin.assert:
        that: >-
          jail_skel_get_dset_props_task.ansible_facts.ansible_zfs_datasets
            | selectattr("name", "equalto", jail_skel_zfs_dataset)
            | selectattr("mounted", "equalto", "yes")
            | count == 1
        fail_msg: "{{ jail_skel_zfs_dataset }} is not mounted"
        quiet: true

    - name: "Extract dataset mountpoint"
      ansible.builtin.set_fact:
        jail_skel_path: >-
          {{
            jail_skel_get_dset_props_task.ansible_facts.ansible_zfs_datasets
              | selectattr('name', 'equalto', jail_skel_zfs_dataset)
              | map(attribute='mountpoint')
              | first
              | default(omit)
          }}

- name: "Configure jail service"
  notify: "jail_skel_snapshot"
  vars:
    _rc_file: /etc/rc.conf.d/jail
  block:
    - name: "Create /etc/jail.conf"
      vars:
        prefix: "{{ jail_skel_path }}"
      ansible.builtin.template:
        src: etc/jail.conf.j2
        dest: /etc/jail.conf
        owner: root
        group: wheel
        mode: u=rw,g=r,o=r
        validate: /usr/sbin/jail -f %s -e ' '

    - name: "Update {{ _rc_file }} - enable jail service" # noqa name[template]
      community.general.sysrc:
        name: jail_enable
        value: true
        path: "{{ _rc_file }}"
      notify: "start_jail"

    - name: "Update {{ _rc_file }} - stop jails in reverse order" # noqa name[template]
      community.general.sysrc:
        name: jail_reverse_stop
        value: true
        path: "{{ _rc_file }}"

- name: "Install packages"
  notify: "jail_skel_snapshot"
  block:
    - name: "Install pkg keys"
      vars:
        _keys_path: "{{ jail_skel_path }}/usr/share"
      block:
        - name: "Create keys folder {{ _keys_path }}"
          ansible.builtin.file:
            path: "{{ _keys_path }}"
            state: directory
            owner: root
            group: wheel
            mode: u=rwx,g=rx,o=rx

        - name: "Copy keys from /usr/share/keys"
          ansible.builtin.copy:
            src: /usr/share/keys
            dest: "{{ _keys_path }}/"
            owner: root
            group: wheel
            mode: u=rwx,g=rx,o=rx
            remote_src: true

    - name: "Install with pkg database"
      vars:
        _db_path: "{{ jail_skel_path }}/var/db/pkg/repos"
      block:
        - name: "Create pkg db at {{ _db_path }}"
          ansible.builtin.file:
            path: "{{ _db_path }}"
            state: directory
            owner: root
            group: wheel
            mode: u=rwx,g=rx,o=rx

        - name: "Mount metadata cache at {{ _db_path }}"
          ansible.posix.mount:
            path: "{{ _db_path }}"
            src: tmpfs
            fstype: tmpfs
            state: present

        - name: "Install packages to {{ jail_skel_path }}"
          community.general.pkgng:
            rootdir: "{{ jail_skel_path }}"
            name: "{{ jail_skel_default_packages | union(jail_skel_packages) }}"
            state: present
      always:
        - name: "Unmount metadata cache at {{ _db_path }}"
          ansible.posix.mount:
            path: "{{ _db_path }}"
            state: unmounted

    - name: "Installed packages"
      block:
        - name: "List installed packages at {{ jail_skel_path }}"
          ansible.builtin.command:
            cmd: pkg -r {{ jail_skel_path }} leaf
          register: jail_skel_list_packages_task
          changed_when: false

        - name: "Installed packages at {{ jail_skel_path }}"
          ansible.builtin.debug:
            var: jail_skel_list_packages_task.stdout_lines

    - name: "Installed userland"
      block:
        - name: "Get installed userland at {{ jail_skel_path }}"
          ansible.builtin.command:
            cmd: chroot {{ jail_skel_path }} freebsd-version -u
          register: jail_skel_get_os_version_task
          changed_when: false

        - name: "Installed userland at {{ jail_skel_path }}"
          ansible.builtin.debug:
            msg: "userland: {{ jail_skel_get_os_version_task.stdout }}"

- name: "Configure users"
  notify: "jail_skel_snapshot"
  block:
    - name: "Migrate users"
      ansible.builtin.include_role:
        name: user_migrate
      vars:
        user_migrate_users: "{{ jail_skel_migrate_users }}"
        user_migrate_rootdir: "{{ jail_skel_path }}"

- name: "Enable sshd"
  community.general.sysrc:
    name: sshd_enable
    value: true
    path: "{{ jail_skel_path }}/etc/rc.conf"
  notify: "jail_skel_snapshot"
