---
- name: Bootstrap Jails
  hosts: nuc.lab.net
  roles:
    - role: jail_skel
      tags: jail_skel

- name: Import SSL jail
  ansible.builtin.import_playbook: "playbooks/jail_ssl.yml"

- name: Import DNS jail
  ansible.builtin.import_playbook: "playbooks/jail_dns.yml"

- name: Import LDAP jail
  ansible.builtin.import_playbook: "playbooks/jail_ldap.yml"
