---
- name: Configure NUC
  hosts: nuc.lab.net

  gather_facts: false

  become: true
  become_method: community.general.doas

  vars:
    # keep-sorted start
    jail_bridge: bridge1
    jail_cidr: 10.0.0.2/24
    jail_defaultrouter: 10.0.0.1
    jail_name: dns
    # keep-sorted end

  roles:
    - role: jail
      tags: jail

- name: Configure DNS
  hosts: dns.lab.net

  gather_facts: false

  become: true
  become_method: community.general.doas

  roles:
    - role: ssh
      tags: ssh

    - role: syslog
      tags: syslog

    - role: user
      tags: user
