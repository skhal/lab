- name: Periodic
  hosts: nuc.lab.net
  become: true
  become_method: community.general.doas

  tasks:
    - name: Daily log to /var/log/daily.log
      community.general.sysrc:
        path: /etc/periodic.conf
        name: daily_output
        value: /var/log/daily.log
