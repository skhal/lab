- name: Syslog
  hosts: nuc.lab.net
  become: true
  become_method: community.general.doas

  tasks:
    - name: Remove syslogd_flags from rc.conf
      community.general.sysrc:
        name: syslogd_flags
        state: absent

    - name: Add syslogd_flags to syslogd config
      community.general.sysrc:
        path: /etc/rc.conf.d/syslogd
        name: syslogd_flags
        value: -ss

    - name: Enable console logs
      ansible.builtin.lineinfile:
        path: /etc/syslog.conf
        regexp: "^#(console.info.*)$"
        line: "\\1"
        backrefs: true
      notify: "restart syslog"

    - name: Cron uses sh(1)
      ansible.builtin.cron:
        name: SHELL
        env: true
        value: /bin/sh

  handlers:
    - name: Restart syslogd
      ansible.builtin.service:
        name: syslogd
        state: restarted
      listen: "restart syslog"
