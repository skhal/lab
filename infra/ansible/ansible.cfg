# keep-sorted start
[defaults]
callbacks_enabled = timer, profile_tasks, profile_roles
connection_plugins = ./plugins/connection
inventory = ./inventory
log_path = ~/log/ansible.log
nocows = true
# keep-sorted end

# https://www.redhat.com/en/blog/faster-ansible-playbook-execution
[connection]
pipelining = true

# keep-sorted start
[ssh_connection]
# ControlMaster - reuse existing connections
# ControlPersist - keep connections alive for N seconds after last session
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
# keep-sorted end
