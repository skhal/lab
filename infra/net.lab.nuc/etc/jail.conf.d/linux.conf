linux {
  $id = "12";

  $bridge1 = "bridge1";
  $bridge1_ip = "${bridge1}:10.0.0.${id}/24";

  $bridges = "${bridge1}";
  $bridgeips = "${bridge1_ip}";

  host.hostname = "${name}.lab.net";
  path = "/usr/jail/${name}";

  depend  = "dns";
  depend += "ldap";

  vnet;

  # keep-sorted start
  allow.mount.devfs;
  allow.mount.fdescfs;
  allow.mount.linprocfs;
  allow.mount.linsysfs;
  allow.mount.procfs;
  allow.mount.tmpfs;
  allow.mount;
  allow.raw_sockets;
  # keep-sorted end

  mount += "/home/op  $path/usr/ubuntu/24.04/home/op nullfs rw 0 0";
  mount += "/home/skhalatyan $path/usr/ubuntu/24.04/home/skhalatyan nullfs rw 0 0";
  mount += "devfs     $path/usr/ubuntu/24.04/dev     devfs     rw 0 0";
  mount += "fdescfs   $path/usr/ubuntu/24.04/dev/fd  fdescfs   rw,linrdlnk 0 0";
  mount += "linprocfs $path/usr/ubuntu/24.04/proc    linprocfs rw 0 0";
  mount += "linsysfs  $path/usr/ubuntu/24.04/sys     linsysfs  rw 0 0";
  mount += "tmpfs     $path/usr/ubuntu/24.04/dev/shm tmpfs     rw,size=1g,mode=1777 0 0";
  mount.devfs;
  devfs_ruleset = 5;

  enforce_statfs = 1;

  exec.clean;
  exec.consolelog = "/var/log/jail_${name}.log";

  exec.prestart = "/bin/sh /usr/local/etc/rc.jail prestart ${name} ${bridges}";
  exec.created  = "/bin/sh /usr/local/etc/rc.jail created ${name} ${bridgeips}";
  exec.start    = "/bin/sh /etc/rc";

  exec.stop     = "/bin/sh /etc/rc.shutdown";
  exec.poststop = "/bin/sh /usr/local/etc/rc.jail poststop ${name} ${bridges}";
}
